# GitLab CI/CD — Limen
# Baut das Next.js-Standalone-Docker-Image (multi-stage Dockerfile) und legt es
# in der GitLab Container Registry DIESES Projekts ab.
#
# Voraussetzungen:
#   - Container Registry des Projekts aktiviert
#     (Settings > General > Visibility, project features, permissions > Container Registry).
#   - Mindestens ein GitLab-Runner verfügbar (shared oder eigener).
#     Kaniko baut OHNE privileged-Runner / OHNE Docker-in-Docker.
#
# APP_BASE_URL wird NICHT zur Build-Zeit gebraucht (reine Laufzeit-Config via compose/.env);
# das Image ist deployment-URL-unabhängig, daher ist KEINE CI/CD-Variable nötig. CSRF der
# Server Actions hängt am Origin↔Host-Abgleich (nginx muss den korrekten Host durchreichen).
#
# Ergebnis-Tags:
#   - Push auf den Default-Branch (main) ->  :latest  und  :<kurz-sha>
#   - Git-Tag (z. B. v1.1.0)            ->  :<tag>   und  :latest
#
# Image-Pfad (von GitLab vorgegeben):  $CI_REGISTRY_IMAGE
#   z. B.  registry.gitlab.hs-anhalt.de/stura/limen

stages:
  - test
  - build

# ---------------------------------------------------------------------------
# Qualitäts-Gate: Lint + Typecheck.
# Schnelleres, granulareres Feedback als der Image-Build (der via `next build`
# die Typen ebenfalls prüft; ESLint ist im Build via ignoreDuringBuilds aus).
# Wer das nicht will, kann diesen Job löschen.
# ---------------------------------------------------------------------------
lint-typecheck:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm run typecheck
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------------
# Image bauen + in die Container Registry pushen (Kaniko, unprivileged).
# Läuft nur auf dem Default-Branch und auf Git-Tags — nicht auf jedem
# Feature-Branch (sonst füllt sich die Registry mit Wegwerf-Images).
# ---------------------------------------------------------------------------
build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # Registry-Login für Kaniko (nutzt den automatischen CI-Job-Token).
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    # Ziel-Tags je nach Auslöser zusammenbauen …
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        TAGS="${CI_COMMIT_TAG} latest"
      else
        TAGS="${CI_COMMIT_SHORT_SHA} latest"
      fi
      DESTS=""
      for t in ${TAGS}; do
        DESTS="${DESTS} --destination ${CI_REGISTRY_IMAGE}:${t}"
      done
      echo "Baue & pushe:${DESTS}"
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --cache=true \
        --cache-repo "${CI_REGISTRY_IMAGE}/cache" \
        ${DESTS}
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
